name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run build
      - run: npm test
      - run: node dist/cli.js --help
      - run: node dist/cli.js doctor --json
      - name: CLI smoke mission flow
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          cd "$tmp"
          git init -b main
          git config user.name "CI"
          git config user.email "ci@example.com"
          printf '{"scripts":{"test":"node -e \"process.exit(0)\""}}\n' > package.json
          git add package.json
          git commit -m init
          node "$GITHUB_WORKSPACE/dist/cli.js" init --json > init.json
          node -e "const fs=require('node:fs'); const p='.sovryn/config.json'; const c=JSON.parse(fs.readFileSync(p,'utf8')); c.verify.commands=['node -e \"process.exit(0)\"']; fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n')"
          node "$GITHUB_WORKSPACE/dist/cli.js" spawn "write evidence" --runner fake --json > spawn.json
          mission_id="$(node -e "const fs=require('node:fs'); console.log(JSON.parse(fs.readFileSync('spawn.json','utf8')).data.mission.id)")"
          node "$GITHUB_WORKSPACE/dist/cli.js" status --json
          node "$GITHUB_WORKSPACE/dist/cli.js" review "$mission_id" --json
          node "$GITHUB_WORKSPACE/dist/cli.js" finalize "$mission_id" --json
